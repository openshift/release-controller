          humanProwResultsURL: "https://prow.ci.openshift.org/view/gs/origin-ci-test/logs/periodic-ci-openshift-hypershift-release-4.22-periodics-e2e-azure-aks-ovn-conformance/1234567900"

  # ============================================================================
  # QUALIFIERS SUMMARY - Computed by QualifiersSummaryController
  # ============================================================================
  # This section is automatically computed by the QualifiersSummaryController.
  # It takes the job-level qualifiers from .spec, merges them with global config
  # (from release-qualifiers-comprehensive.yaml), and aggregates by qualifier ID.
  #
  # For each qualifier:
  # - jobs: All jobs referencing this qualifier
  # - aggregateState: Overall state (Success/Failure/Pending/Unknown)
  # - badgeName: Display name from merged config
  # - badgeEarned: true if enabled AND all jobs succeeded
  # - badgePropagated: true if badge earned AND PayloadBadgeStatus allows it
  qualifiersSummary:
    # --------------------------------------------------------------------------
    # ROSA Qualifier Summary
    # --------------------------------------------------------------------------
    # 2 jobs: rosa-classic-sts-conformance (empty override), rosa-hcp-conformance (labels override)
    # After merge with global:
    #   - rosa-classic-sts-conformance: Full global config
    #   - rosa-hcp-conformance: Global config but with job labels
    # Both succeeded → aggregateState: Success
    # Global payloadBadgeStatus: Yes → Badge propagated
    rosa:
      jobs:
        - ciConfigurationName: rosa-classic-sts-conformance
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-rosa-sts-ovn
        - ciConfigurationName: rosa-hcp-conformance
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-rosa-hcp-ovn
      aggregateState: Success
      badgeName: "ROSA"  # From global config
      badgeEarned: true      # enabled: true AND aggregateState: Success
      badgePropagated: true  # badgeEarned: true AND payloadBadgeStatus: Yes

    # --------------------------------------------------------------------------
    # HCM Qualifier Summary
    # --------------------------------------------------------------------------
    # 1 job: hcm-cluster-lifecycle (adds new escalations)
    # After merge with global:
    #   - Global escalations (monitor, high, low, normal, high, critical)
    #   - Job escalations (urgent, blocker) added
    # Job failed → aggregateState: Failure
    # Global payloadBadgeStatus: Yes, but badge not earned due to failure
    hcm:
      jobs:
        - ciConfigurationName: hcm-cluster-lifecycle
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-hcm-lifecycle
      aggregateState: Failure
      badgeName: "HCM"  # From global config
      badgeEarned: false     # enabled: true BUT aggregateState: Failure
      badgePropagated: false # badgeEarned: false

    # --------------------------------------------------------------------------
    # OSD Qualifier Summary
    # --------------------------------------------------------------------------
    # 2 jobs:
    #   - osd-aws-interop (enabled: false in job)
    #   - osd-gcp-production (complete override in job)
    # After merge:
    #   - osd-aws-interop: enabled: false (disabled, won't count)
    #   - osd-gcp-production: Uses job config entirely
    # Only osd-gcp-production counts (enabled job succeeded)
    # Job payloadBadgeStatus: Yes → Badge propagated (shown as "OSD-GCP-PROD")
    osd:
      jobs:
        - ciConfigurationName: osd-aws-interop
          ciConfigurationJobName: periodic-ci-openshift-osde2e-main-nightly-4.22-osd-aws
        - ciConfigurationName: osd-gcp-production
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-osd-ccs-gcp
      aggregateState: Success  # Only osd-gcp-production counts (enabled)
      badgeName: "OSD-GCP-PROD"  # From job-level override
      badgeEarned: true        # enabled job succeeded
      badgePropagated: true    # badgeEarned: true AND payloadBadgeStatus: Yes

    # --------------------------------------------------------------------------
    # TELCO Qualifier Summary
    # --------------------------------------------------------------------------
    # 1 job: telco-5g-ran-du (labels and notifications override)
    # After merge with global:
    #   - Uses job labels and notifications
    #   - Other fields from global
    # Job succeeded → aggregateState: Success
    # Global payloadBadgeStatus: Yes → Badge earned and propagated
    telco:
      jobs:
        - ciConfigurationName: telco-5g-ran-du
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-telco-5g-ran
      aggregateState: Success
      badgeName: "TELCO"  # From global config
      badgeEarned: true
      badgePropagated: true

    # --------------------------------------------------------------------------
    # HYPERSHIFT Qualifier Summary
    # --------------------------------------------------------------------------
    # 2 jobs:
    #   - hypershift-aws-conformance (notification override with thread)
    #   - hypershift-azure-conformance (notification override with different thread)
    # After merge with global:
    #   - Both use job notification config (different threads)
    #   - Other fields from global
    # AWS succeeded, Azure pending → aggregateState: Pending
    # Global payloadBadgeStatus: OnSuccess → Badge NOT propagated (not all Success)
    hypershift:
      jobs:
        - ciConfigurationName: hypershift-aws-conformance
          ciConfigurationJobName: periodic-ci-openshift-hypershift-release-4.22-periodics-e2e-aws-ovn-conformance
        - ciConfigurationName: hypershift-azure-conformance
          ciConfigurationJobName: periodic-ci-openshift-hypershift-release-4.22-periodics-e2e-azure-aks-ovn-conformance
      aggregateState: Pending
      badgeName: "HYPERSHIFT"  # From global config
      badgeEarned: false     # aggregateState: Pending (not Success)
      badgePropagated: false # badgeEarned: false

    # --------------------------------------------------------------------------
    # PERFSCALE Qualifier Summary
    # --------------------------------------------------------------------------
    # 2 jobs:
    #   - telco-5g-ran-du (badgeName, summary, description, labels override)
    #   - perfscale-cluster-density-heavy (summary, description, labels, notifications override)
    # After merge:
    #   - telco-5g-ran-du: Uses "5G-PERF" badge name
    #   - perfscale-cluster-density-heavy: Uses global "PERFSCALE" badge name with job overrides
    # Both succeeded → aggregateState: Success
    # Global payloadBadgeStatus: OnSuccess → Badge earned and propagated
    # Note: When multiple jobs have different badgeNames, summary could show both or pick one
    perfscale:
      jobs:
        - ciConfigurationName: telco-5g-ran-du
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-telco-5g-ran
        - ciConfigurationName: perfscale-cluster-density-heavy
          ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-perfscale-density
      aggregateState: Success
      badgeName: "PERFSCALE"  # From global (or could show both badges)
      badgeEarned: true
      badgePropagated: true

    # --------------------------------------------------------------------------
    # SECURITY Qualifier Summary
    # --------------------------------------------------------------------------
    # 1 job: security-fips-scan (complete override)
    # After merge:
