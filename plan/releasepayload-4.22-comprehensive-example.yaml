---
# Comprehensive ReleasePayload Example
#
# This ReleasePayload demonstrates how the Release Qualifiers system works in practice.
#
# IMPORTANT: The .spec.payloadVerificationConfig.*.qualifiers field contains ONLY
# what's defined in the ReleaseConfig (release-ocp-4.22-comprehensive.json).
#
# The merge with global config (release-qualifiers-comprehensive.yaml) happens
# internally within the controllers. The spec reflects the SOURCE configuration,
# not the computed/merged configuration.
#
# The QualifiersSummary in .status is automatically computed by the
# QualifiersSummaryController and shows the final merged state.
#
# See: /home/brawilli/Workspaces/Go/src/github.com/openshift/release-controller/pkg/apis/release/v1alpha1/types.go

apiVersion: release.openshift.io/v1alpha1
kind: ReleasePayload
metadata:
  name: 4.22.0-0.nightly-2026-03-11-120000
  namespace: ocp
  labels:
    release.openshift.io/imagestream: release
    release.openshift.io/imagestreamtag-name: 4.22.0-0.nightly-2026-03-11-120000
  annotations:
    release.openshift.io/release-config: 4.22.0-0.nightly
    release.openshift.io/source: "ocp/4.22-art-latest-2026-03-11-120000"

spec:
  # ============================================================================
  # Payload Coordinates - Points to the release imagestreamtag
  # ============================================================================
  payloadCoordinates:
    namespace: ocp
    imagestreamName: release
    imagestreamTagName: 4.22.0-0.nightly-2026-03-11-120000

  # ============================================================================
  # Payload Creation Config - Job and mirror configuration
  # ============================================================================
  payloadCreationConfig:
    releaseCreationCoordinates:
      namespace: ci-release
      releaseCreationJobName: release-4.22.0-0.nightly-2026-03-11-120000
    prowCoordinates:
      namespace: ci
    releaseMirrorCoordinates:
      namespace: ci-release
      releaseMirrorJobName: mirror-4.22.0-0.nightly-2026-03-11-120000

  # ============================================================================
  # Payload Verification Config - Jobs that verify this release
  # ============================================================================
  # The qualifiers shown here are EXACTLY as defined in the ReleaseConfig
  # (release-ocp-4.22-comprehensive.json). The merge with global qualifiers
  # happens internally in the controllers.
  payloadVerificationConfig:
    payloadVerificationDataSource: BuildFarmLookup

    # --------------------------------------------------------------------------
    # Blocking Jobs - Must pass for release acceptance
    # --------------------------------------------------------------------------
    blockingJobs:
      # ========================================================================
      # PATTERN 1: Simple Inheritance
      # ========================================================================
      # Empty object {} means: inherit everything from global rosa qualifier
      # No job-level overrides at all
      - ciConfigurationName: rosa-classic-sts-conformance
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-rosa-sts-ovn
        maxRetries: 1
        qualifiers:
          rosa: {}

      # ========================================================================
      # PATTERN 2: Labels-Only Override
      # ========================================================================
      # Job specifies ONLY labels - everything else inherited from global
      - ciConfigurationName: rosa-hcp-conformance
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-rosa-hcp-ovn
        maxRetries: 2
        qualifiers:
          rosa:
            labels:
              - "rosa-hcp-failure"
              - "hosted-cp-blocker"

      # ========================================================================
      # PATTERN 3: Adding New Escalations
      # ========================================================================
      # Job defines ONLY new escalations (urgent, blocker)
      # Global escalations will be merged in by the controller
      - ciConfigurationName: hcm-cluster-lifecycle
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-hcm-lifecycle
        maxRetries: 2
        qualifiers:
          hcm:
            notifications:
              slack:
                escalations:
                  - name: "urgent"
                    period: "12h"
                    minFailures: 5
                    channel: "#forum-ocm-urgent"
                    mentions:
                      - "@ocm-director"
                      - "@hcm-vp"
              jira:
                escalations:
                  - name: "blocker"
                    failures: 10
                    priority: "blocker"
                    mentions:
                      - "ocm-director"

      # ========================================================================
      # PATTERN 8: Complete Override
      # ========================================================================
      # Job specifies ALL fields - completely replaces global security qualifier
      - ciConfigurationName: security-fips-scan
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-fips-payload-scan
        maxRetries: 0
        qualifiers:
          security:
            badgeName: "FIPS"
            summary: "FIPS Compliance Validation"
            description: "Validates FIPS 140-2 compliance including cryptographic module validation and approved algorithms"
            labels:
              - "fips-failure"
              - "compliance-blocker"
              - "security-critical"
            notifications:
              slack:
                escalations:
                  - name: "security-alert"
                    period: "1h"
                    minFailures: 1
                    channel: "#forum-fips-compliance"
                    mentions:
                      - "@fips-compliance-team"
                      - "@security-architect"
              jira:
                project: "SECURITY"
                component: "FIPS"
                assignee: "fips-team@redhat.com"
                summary: "CRITICAL: FIPS compliance failure in {{.Release}}"
                description: "FIPS validation has failed. This is a compliance violation and blocks release. Do not ship this payload."
                escalations:
                  - name: "immediate"
                    failures: 1
                    priority: "blocker"
                    mentions:
                      - "fips-lead"
                      - "compliance-manager"
                      - "legal-contact"
                    needsInfo:
                      - "crypto-team"

      # ========================================================================
      # PATTERN 10: Thread Separation
      # ========================================================================
      # Job specifies notification overrides with thread
      # Other fields inherited from global
      - ciConfigurationName: hypershift-aws-conformance
        ciConfigurationJobName: periodic-ci-openshift-hypershift-release-4.22-periodics-e2e-aws-ovn-conformance
        maxRetries: 2
        qualifiers:
          hypershift:
            notifications:
              slack:
                thread: "hypershift-aws"
                escalations:
                  - name: "hypershift-dev"
                    period: "24h"
                    minFailures: 2
                    channel: "#forum-hypershift-aws"
                    mentions:
                      - "@hypershift-aws-team"
              jira:
                thread: "hypershift-aws"
                component: "HyperShift-AWS"
                assignee: "hypershift-aws@redhat.com"
                summary: "HyperShift AWS failure in {{.Release}}"

    # --------------------------------------------------------------------------
    # Informing Jobs - Don't block release but provide important data
    # --------------------------------------------------------------------------
    informingJobs:
      # ========================================================================
      # PATTERN 5: Disabling a Qualifier
      # ========================================================================
      # Job explicitly sets enabled: false to disable this qualifier for this job
      - ciConfigurationName: osd-aws-interop
        ciConfigurationJobName: periodic-ci-openshift-osde2e-main-nightly-4.22-osd-aws
        maxRetries: 2
        qualifiers:
          osd:
            enabled: false

      # ========================================================================
      # PATTERN 6: Complete Override
      # ========================================================================
      # Job completely replaces global OSD qualifier with production-specific config
      - ciConfigurationName: osd-gcp-production
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-osd-ccs-gcp
        maxRetries: 3
        qualifiers:
          osd:
            badgeName: "OSD-GCP-PROD"
            summary: "OSD GCP Production Validation"
            description: "Production-level validation of OSD on GCP with customer simulation workloads"
            payloadBadgeStatus: "Yes"
            labels:
              - "osd-gcp-production-failure"
              - "customer-impact"
            notifications:
              slack:
                escalations:
                  - name: "production-alert"
                    period: "6h"
                    minFailures: 1
                    channel: "#osd-production-alerts"
                    mentions:
                      - "@osd-production-oncall"
                      - "@osd-gcp-lead"
              jira:
                project: "OSDPROD"
                component: "GCP"
                assignee: "osd-gcp-oncall@redhat.com"
                summary: "PRODUCTION: OSD GCP failure in {{.Release}}"
                description: "Production OSD GCP testing has failed. Customer impact possible. Investigate immediately."
                escalations:
                  - name: "production-failure"
                    failures: 1
                    priority: "critical"
                    mentions:
                      - "osd-gcp-oncall"
                      - "osd-production-manager"

      # ========================================================================
      # PATTERN 7: Multi-Qualifier Job
      # ========================================================================
      # Single job references TWO qualifiers with different overrides for each
      - ciConfigurationName: telco-5g-ran-du
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-telco-5g-ran
        maxRetries: 2
        qualifiers:
          # First qualifier: telco with custom labels and notifications
          telco:
            labels:
              - "telco-ran-failure"
              - "5g-blocker"
            notifications:
              slack:
                escalations:
                  - name: "telco-alert"
                    period: "24h"
                    minFailures: 2
                    channel: "#forum-telco-ran"
                    mentions:
                      - "@ran-du-team"
                      - "@telco-5g-lead"
          # Second qualifier: perfscale with custom badge and summary
          perfscale:
            badgeName: "5G-PERF"
            summary: "5G RAN Performance"
            description: "Performance validation for 5G RAN DU workloads under production load"
            labels:
              - "5g-performance-regression"

      # ========================================================================
      # PATTERN 9: Performance Override with Relaxed Thresholds
      # ========================================================================
      # Job overrides perfscale with more relaxed settings for heavy testing
      - ciConfigurationName: perfscale-cluster-density-heavy
        ciConfigurationJobName: periodic-ci-openshift-release-main-nightly-4.22-e2e-perfscale-density
        maxRetries: 3
        qualifiers:
          perfscale:
            summary: "Cluster Density - Heavy Load"
            description: "Extreme cluster density testing with maximum pod count and control plane stress"
            labels:
              - "density-performance-issue"
            notifications:
              slack:
                escalations:
                  - name: "perf-alert"
                    period: "168h"
                    minFailures: 8
                    channel: "#forum-perfscale-density"
                    mentions:
                      - "@density-testing-team"
              jira:
                escalations:
                  - name: "regression"
                    overLastRuns: 30
                    passPercentage: 40
                    priority: "normal"
                    mentions:
                      - "density-lead"

      # ========================================================================
      # PATTERN 10: Thread Separation (Azure)
      # ========================================================================
      # Same qualifier as hypershift-aws but with different thread
      - ciConfigurationName: hypershift-azure-conformance
        ciConfigurationJobName: periodic-ci-openshift-hypershift-release-4.22-periodics-e2e-azure-aks-ovn-conformance
        maxRetries: 2
        qualifiers:
          hypershift:
            notifications:
              slack:
                thread: "hypershift-azure"
                escalations:
                  - name: "hypershift-dev"
                    period: "24h"
                    minFailures: 2
                    channel: "#forum-hypershift-azure"
                    mentions:
                      - "@hypershift-azure-team"
              jira:
                thread: "hypershift-azure"
                component: "HyperShift-Azure"
                assignee: "hypershift-azure@redhat.com"
                summary: "HyperShift Azure failure in {{.Release}}"

# ==============================================================================
# STATUS - Computed by the Release Controller
# ==============================================================================
# The status section is populated and updated by the release-controller as jobs
# execute and complete. The QualifiersSummary is computed by the
# QualifiersSummaryController by merging the spec qualifiers with global config.

status:
  # ----------------------------------------------------------------------------
  # Conditions - High-level payload state
  # ----------------------------------------------------------------------------
  conditions:
    - type: PayloadCreated
      status: "True"
      lastTransitionTime: "2026-03-11T12:00:00Z"
      reason: ReleaseCreated
